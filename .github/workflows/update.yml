name: Update fitness dashboard

on:
  schedule:
    # Runs at 07:00, 13:00, and 20:00 UTC every day
    - cron: "0 7 * * *"
    - cron: "0 13 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:   # lets you trigger a manual run from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages branch

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Process health data
        env:
          GIST_RAW_URL: "https://gist.githubusercontent.com/taktaiev/6691552dd387ce2e525723719d74f6e3/raw/workouts.json"
        run: python process_health.py

      - name: Copy dashboard files to deploy folder
        run: |
          mkdir -p _site
          cp index.html _site/
          cp data.json  _site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./_site
          force_orphan: true
